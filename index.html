<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Developer | Professional Card</title>
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: rgba(20, 20, 20, 0.8);
            --accent-color: #ffffff;
            --text-secondary: #888;
            --whatsapp: #25D366;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at center, #111 0%, #050505 100%);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        /* حاوية البطاقة مع تأثير زجاجي */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 40px 25px;
            width: 90%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* صورة البروفايل مع إطار مضيء */
        .profile-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.1);
            z-index: 2;
            position: relative;
        }

        .profile-container::after {
            content: '';
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            border-radius: 50%;
            background: linear-gradient(45deg, #333, #666, #333);
            z-index: 1;
            animation: rotate 4s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        h1 { font-size: 24px; margin: 10px 0; letter-spacing: 1px; }
        .title { color: var(--text-secondary); font-size: 14px; margin-bottom: 30px; display: block; }

        .section-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #444;
            margin: 25px 0 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .section-label::before, .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #222;
            margin: 0 10px;
        }

        /* الأزرار الاحترافية */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            padding: 14px;
            margin-bottom: 12px;
            border-radius: 12px;
            font-weight: 500;
            font-size: 15px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .btn:hover {
            transform: scale(1.03);
            background: rgba(255,255,255,0.1);
        }

        .btn-whatsapp { background: var(--whatsapp); box-shadow: 0 4px 15px rgba(37, 211, 102, 0.2); }
        .btn-insta { background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); }
        .btn-work { background: rgba(255,255,255,0.05); }

        .footer {
            margin-top: 35px;
            font-size: 10px;
            color: #222;
            letter-spacing: 2px;
        }

        /* لمسة برمجية: تأثير عند الضغط */
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div class="card">
    <div class="profile-container">
        <img src="profile.jpg" alt="MD" class="profile-img" onerror="this.src='https://ui-avatars.com/api/?name=MD&background=111&color=fff&size=128'">
    </div>
    
    <h1>MOHAMED DEV</h1>
    <span class="title">FULL-STACK WEB DEVELOPER</span>

    <div class="section-label">اتصال سريع</div>
    <a href="https://wa.me/212641727135" target="_blank" class="btn btn-whatsapp">
        <span>WHATSAPP DIRECT</span>
    </a>
    <a href="https://instagram.com/med__23k" target="_blank" class="btn btn-insta">
        <span>INSTAGRAM PORTFOLIO</span>
    </a>

    <div class="section-label">معرض المشاريع</div>
    <a href="https://businessmohameddev.github.io/ORIFLAME.LUXE/" target="_blank" class="btn btn-work">E-COMMERCE PROJECT</a>
    <a href="https://businessmohameddev.github.io/E-MA-STORE/" target="_blank" class="btn btn-work">MODERN LANDING PAGE</a>
    
    <div class="footer">TETOUAN • MOROCCO • 2026</div>
</div>

</body>
</html>
